name: chatapp
description: A premium dark-theme Flutter chat application.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # Google Fonts — DM Sans for a refined, modern feel
  google_fonts: ^6.2.1

  # Cupertino icons (optional extras)
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
